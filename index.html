<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>維修工時確認單</title>
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <style>
        :root {
            --primary-color: #0056b3;
            --bg-color: #f4f7f6;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            margin: 0;
            padding: 20px;
            color: #333;
        }
        .container {
            max-width: 600px;
            margin: 0 auto;
            background: #fff;
            padding: 20px 30px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        h2 {
            text-align: center;
            color: var(--primary-color);
            border-bottom: 2px solid var(--primary-color);
            padding-bottom: 10px;
        }
        .form-group {
            margin-bottom: 15px;
            display: flex;
            flex-direction: column;
        }
        .form-group label {
            font-weight: bold;
            margin-bottom: 5px;
        }
        .form-group input[type="text"], 
        .form-group input[type="date"], 
        .form-group input[type="time"], 
        .form-group input[type="number"], 
        .form-group textarea {
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 4px;
            font-size: 16px; /* 避免 iOS 自動放大 */
        }
        .radio-group {
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            padding: 10px 0;
        }
        .radio-group label {
            font-weight: normal;
            display: flex;
            align-items: center;
            cursor: pointer;
        }
        .radio-group input {
            margin-right: 5px;
        }
        .time-range {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .time-range input {
            flex: 1;
        }
        .input-group {
            display: flex;
            align-items: center;
        }
        .input-group input {
            flex: 1;
        }
        .input-group span {
            padding: 10px;
            background: #eee;
            border: 1px solid #ccc;
            border-left: none;
            border-radius: 0 4px 4px 0;
            font-weight: bold;
        }
        .btn-group {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }
        button {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 4px;
            font-size: 16px;
            cursor: pointer;
            color: #fff;
            transition: 0.3s;
        }
        .btn-submit { background-color: #28a745; }
        .btn-query { background-color: #17a2b8; }
        .btn-update { background-color: #ffc107; color: #333; }
        .btn-delete { background-color: #dc3545; }
        button:hover { opacity: 0.8; }
        
        #login-section { text-align: center; margin-bottom: 20px; }
        #user-info { display: none; text-align: center; margin-bottom: 20px; color: green; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <h2>維修工時確認單</h2>

    <div id="login-section">
        <p>請先使用 Google 帳號登入</p>
        <div id="g_id_onload"
             data-client_id="135627051798-a7gk5rkej20nds7dfuu6k1s8edev56er.apps.googleusercontent.com"
             data-callback="handleCredentialResponse"
             data-auto_prompt="false">
        </div>
        <div class="g_id_signin" data-type="standard"></div>
    </div>
    
    <div id="user-info">已登入：<span id="user-email"></span></div>

    <form id="maintenanceForm" style="display:none;">
        <input type="hidden" id="recordId"> <div class="form-group">
            <label for="date">日 期</label>
            <input type="date" id="date" required>
        </div>

        <div class="form-group">
            <label>時 間</label>
            <div class="time-range">
                <input type="time" id="startTime" required>
                <span>~</span>
                <input type="time" id="endTime" required>
            </div>
        </div>

        <div class="form-group">
            <label for="unitCode">委託單位代號 (以線為單位)</label>
            <input type="text" id="unitCode">
        </div>

        <div class="form-group">
            <label for="unitName">委託單位名稱 (以線為單位)</label>
            <input type="text" id="unitName">
        </div>

        <div class="form-group">
            <label>類 別</label>
            <div class="radio-group">
                <label><input type="radio" name="category" value="一般叫修" checked> 一般叫修</label>
                <label><input type="radio" name="category" value="TPM"> TPM</label>
                <label><input type="radio" name="category" value="補單"> 補單</label>
                <label><input type="radio" name="category" value="加班搶修"> 加班搶修</label>
                <label><input type="radio" name="category" value="其他"> 其他</label>
            </div>
        </div>

        <div class="form-group">
            <label for="workContent">工作內容</label>
            <textarea id="workContent" rows="5" required></textarea>
        </div>

        <div class="form-group">
            <label for="engineer">工務人員</label>
            <input type="text" id="engineer" required>
        </div>

        <div class="form-group">
            <label for="hours">應計工時</label>
            <div class="input-group">
                <input type="number" id="hours" step="0.5" min="0" required>
                <span>H</span>
            </div>
        </div>

        <div class="btn-group">
            <button type="button" class="btn-submit" onclick="submitData('create')">新增</button>
            <button type="button" class="btn-query" onclick="queryData()">查詢</button>
            <button type="button" class="btn-update" onclick="submitData('update')">修改</button>
            <button type="button" class="btn-delete" onclick="submitData('delete')">刪除</button>
        </div>
    </form>
</div>

<script>
    const GOOGLE_SCRIPT_URL = "請填入您的_GOOGLE_APPS_SCRIPT_網址";
    let currentUserEmail = "";

    // 處理 Google 登入回傳
    function handleCredentialResponse(response) {
        const responsePayload = decodeJwtResponse(response.credential);
        currentUserEmail = responsePayload.email;
        document.getElementById('user-email').innerText = currentUserEmail;
        document.getElementById('login-section').style.display = 'none';
        document.getElementById('user-info').style.display = 'block';
        document.getElementById('maintenanceForm').style.display = 'block';
    }

    // 解析 JWT Token
    function decodeJwtResponse(token) {
        let base64Url = token.split('.')[1];
        let base64 = base64Url.replace(/-/g, '+').replace(/_/g, '/');
        let jsonPayload = decodeURIComponent(atob(base64).split('').map(function(c) {
            return '%' + ('00' + c.charCodeAt(0).toString(16)).slice(-2);
        }).join(''));
        return JSON.parse(jsonPayload);
    }

    // 收集表單資料與操作後端
    function submitData(action) {
        if(!currentUserEmail) return alert("請先登入！");
        
        const data = {
            action: action,
            id: document.getElementById('recordId').value || Date.now().toString(), // 用時間戳當簡易唯一碼
            email: currentUserEmail,
            date: document.getElementById('date').value,
            startTime: document.getElementById('startTime').value,
            endTime: document.getElementById('endTime').value,
            unitCode: document.getElementById('unitCode').value,
            unitName: document.getElementById('unitName').value,
            category: document.querySelector('input[name="category"]:checked').value,
            workContent: document.getElementById('workContent').value,
            engineer: document.getElementById('engineer').value,
            hours: document.getElementById('hours').value
        };

        if(action === 'create' && (!data.date || !data.workContent)) return alert("請填寫必填欄位");

        fetch(GOOGLE_SCRIPT_URL, {
            method: 'POST',
            body: JSON.stringify(data),
            headers: { 'Content-Type': 'text/plain;charset=utf-8' } // 避免 CORS preflight 錯誤
        })
        .then(response => response.json())
        .then(result => {
            if(result.status === "success") {
                alert(`操作成功：${action}`);
                if(action === 'create' || action === 'delete') document.getElementById('maintenanceForm').reset();
            } else {
                alert("操作失敗，請重試");
            }
        })
        .catch(error => alert('連線錯誤: ' + error));
    }

    // 簡易查詢邏輯示範 (以日期查詢為例)
    function queryData() {
        const queryDate = document.getElementById('date').value;
        if(!queryDate) return alert("請先選擇要查詢的『日期』");
        
        const url = `${GOOGLE_SCRIPT_URL}?action=read&date=${queryDate}&email=${currentUserEmail}`;
        fetch(url)
        .then(res => res.json())
        .then(data => {
            if(data.length > 0) {
                // 將查詢到的第一筆資料填入表單
                const item = data[0];
                document.getElementById('recordId').value = item.id;
                document.getElementById('startTime').value = item.startTime;
                document.getElementById('endTime').value = item.endTime;
                document.getElementById('unitCode').value = item.unitCode;
                document.getElementById('unitName').value = item.unitName;
                document.querySelector(`input[name="category"][value="${item.category}"]`).checked = true;
                document.getElementById('workContent').value = item.workContent;
                document.getElementById('engineer').value = item.engineer;
                document.getElementById('hours').value = item.hours;
                alert("已載入資料！");
            } else {
                alert("查無該日期的資料。");
            }
        });
    }
</script>
</body>
</html>
